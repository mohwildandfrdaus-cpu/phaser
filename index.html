<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Platformer - Glow Up Player</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<base target="_blank">
</head>
<body>
<div id="gameWrapper">
  <div class="level-label" id="levelLabel">LEVEL 1</div>
  <div class="controls-hint">◀ ▶ ▲ lompat | R = restart</div>
  <button class="settings-btn" id="settingsBtn">🔊</button>
  <div class="settings-panel" id="settingsPanel">
    <h3>⚙️ PENGATURAN</h3>
    <div class="toggle-row"><label>🔇 Mute All</label><div class="toggle-switch" id="toggleMute" data-key="muted"></div></div>
  </div>
  <div class="mobile-controls" id="mobileControls">
    <div class="mobile-group">
      <div class="mobile-btn" id="btnLeft">◀</div>
      <div class="mobile-btn" id="btnRight">▶</div>
    </div>
    <div class="mobile-btn" id="btnJump">▲</div>
  </div>
</div>
<script src="audio.js"></script>
<script src="level.js"></script>
<script src="graphics.js"></script>
<script src="game.js"></script>
<script src="dom.js"></script>
</body>
</html>
