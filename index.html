<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Platformer - Glow Up Player</title>
  <style>
    * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #070a12; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', monospace; overflow: hidden; }
    #gameWrapper { position: relative; border-radius: 24px; border: 2px solid #ffb74d; box-shadow: 0 20px 35px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08); max-width: 100vw; max-height: 100vh; }
    canvas { display: block; border-radius: 22px; }
    .level-label { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); border: 1px solid #ffb74d; border-radius: 20px; padding: 4px 18px; font-size: 14px; color: #ffb74d; font-weight: bold; font-family: monospace; backdrop-filter: blur(4px); pointer-events: none; z-index: 5; letter-spacing: 2px; }
    .controls-hint { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.55); border-radius: 20px; padding: 4px 12px; font-size: 11px; color: #ddd; font-family: monospace; backdrop-filter: blur(2px); pointer-events: none; z-index: 5; }
    .settings-btn { position: absolute; top: 10px; right: 10px; width: 36px; height: 36px; background: rgba(0,0,0,0.6); border: 1px solid #ffb74d; border-radius: 10px; color: #ffb74d; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); transition: all 0.2s; z-index: 100; }
    .settings-btn:hover { background: rgba(255,183,77,0.2); transform: scale(1.1); }
    .settings-panel { position: absolute; top: 54px; right: 10px; width: 180px; background: rgba(10,15,30,0.95); border: 1px solid #ffb74d; border-radius: 14px; padding: 16px; color: #ddd; font-size: 13px; backdrop-filter: blur(8px); display: none; flex-direction: column; gap: 12px; z-index: 101; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
    .settings-panel.active { display: flex; }
    .settings-panel h3 { margin: 0 0 4px 0; color: #ffb74d; font-size: 14px; text-align: center; border-bottom: 1px solid rgba(255,183,77,0.3); padding-bottom: 8px; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-row label { color: #ccc; font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .toggle-switch { position: relative; width: 36px; height: 20px; background: #444; border-radius: 10px; cursor: pointer; transition: background 0.2s; }
    .toggle-switch.on { background: #ffb74d; }
    .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .toggle-switch.on::after { transform: translateX(16px); }

    /* Mobile Controls */
    .mobile-controls { position: absolute; bottom: 8px; left: 0; width: 100%; height: 90px; display: none; justify-content: space-between; align-items: center; padding: 0 16px; z-index: 50; pointer-events: none; }
    .mobile-btn { width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 2px solid rgba(255,183,77,0.35); color: rgba(255,183,77,0.8); font-size: 24px; display: flex; align-items: center; justify-content: center; pointer-events: auto; touch-action: manipulation; backdrop-filter: blur(4px); }
    .mobile-btn:active { background: rgba(255,183,77,0.25); transform: scale(0.95); }
    .mobile-group { display: flex; gap: 12px; pointer-events: none; }
    .mobile-group .mobile-btn { pointer-events: auto; }
    @media (hover: none) and (pointer: coarse) {
      .mobile-controls { display: flex; }
      .controls-hint { display: none; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<base target="_blank">
</head>
<body>
<div id="gameWrapper">
  <div class="level-label" id="levelLabel">LEVEL 1</div>
  <div class="controls-hint">◀ ▶ ▲ lompat | R = restart</div>
  <button class="settings-btn" id="settingsBtn">🔊</button>
  <div class="settings-panel" id="settingsPanel">
    <h3>⚙️ PENGATURAN</h3>
    <div class="toggle-row"><label>🔇 Mute All</label><div class="toggle-switch" id="toggleMute" data-key="muted"></div></div>
  </div>
  <div class="mobile-controls" id="mobileControls">
    <div class="mobile-group">
      <div class="mobile-btn" id="btnLeft">◀</div>
      <div class="mobile-btn" id="btnRight">▶</div>
    </div>
    <div class="mobile-btn" id="btnJump">▲</div>
  </div>
</div>
<script>
const Settings = { muted: false, bgmGainNode: null, sfxGainNode: null };
const Audio = {
  ctx: null, bgmNodes: [], bgmGain: null, bgmLFO: null, bgmStarted: false, started: false,
  sawNodes: [], sawGains: [], sawActive: false, sawLFO: null, sawLFOGain: null,
  spikeNodes: [], spikeGains: [], spikeActive: false, spikeFilter: null, spikeLFO: null,
  init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
  startAll() {
    if (this.started) return;
    this.started = true;
    this.init();
    setTimeout(() => { this.startBGM(); this.startSawHum(); this.startSpikeHum(); }, 50);
  },
  startBGM() {
    this.init(); if (this.bgmStarted) return; this.bgmStarted = true;
    const now = this.ctx.currentTime;
    this.bgmGain = this.ctx.createGain();
    this.bgmGain.gain.setValueAtTime(0, now);
    this.bgmGain.gain.linearRampToValueAtTime(Settings.muted ? 0 : 0.08, now + 2);
    Settings.bgmGainNode = this.bgmGain;
    this.bgmLFO = this.ctx.createOscillator();
    const lfoGain = this.ctx.createGain();
    this.bgmLFO.type = 'sine'; this.bgmLFO.frequency.setValueAtTime(0.1, now); lfoGain.gain.setValueAtTime(0.015, now);
    const osc1 = this.ctx.createOscillator(), g1 = this.ctx.createGain();
    osc1.type = 'sine'; osc1.frequency.setValueAtTime(55, now); g1.gain.setValueAtTime(1, now);
    const osc2 = this.ctx.createOscillator(), g2 = this.ctx.createGain();
    osc2.type = 'sine'; osc2.frequency.setValueAtTime(110, now); g2.gain.setValueAtTime(0.4, now);
    const osc3 = this.ctx.createOscillator(), g3 = this.ctx.createGain();
    osc3.type = 'triangle'; osc3.frequency.setValueAtTime(165, now); g3.gain.setValueAtTime(0.15, now);
    const osc4 = this.ctx.createOscillator(), g4 = this.ctx.createGain();
    osc4.type = 'sine'; osc4.frequency.setValueAtTime(440, now); g4.gain.setValueAtTime(0.02, now);
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.setValueAtTime(280, now); filter.Q.setValueAtTime(0.5, now);
    const delay = this.ctx.createDelay(); delay.delayTime.setValueAtTime(0.4, now);
    const delayGain = this.ctx.createGain(); delayGain.gain.setValueAtTime(0.3, now);
    this.bgmLFO.connect(lfoGain); lfoGain.connect(g1.gain); lfoGain.connect(g2.gain);
    osc1.connect(g1); g1.connect(filter); osc2.connect(g2); g2.connect(filter);
    osc3.connect(g3); g3.connect(filter); osc4.connect(g4); g4.connect(filter);
    filter.connect(this.bgmGain); this.bgmGain.connect(this.ctx.destination);
    filter.connect(delay); delay.connect(delayGain); delayGain.connect(delay); delayGain.connect(this.ctx.destination);
    osc1.start(); osc2.start(); osc3.start(); osc4.start(); this.bgmLFO.start();
    this.bgmNodes = [osc1, osc2, osc3, osc4, this.bgmLFO];
  },
  stopBGM() {
    if (!this.bgmStarted) return; this.bgmStarted = false;
    const now = this.ctx.currentTime;
    if (this.bgmGain) { this.bgmGain.gain.setValueAtTime(this.bgmGain.gain.value, now); this.bgmGain.gain.linearRampToValueAtTime(0, now + 1.5); }
    setTimeout(() => { this.bgmNodes.forEach(n => { try { n.stop(); } catch (e) {} }); this.bgmNodes = []; this.bgmLFO = null; this.bgmGain = null; Settings.bgmGainNode = null; }, 1500);
  },
  startSawHum() {
    this.init(); if (this.sawActive) return; this.sawActive = true;
    const now = this.ctx.currentTime;
    this.sawLFO = this.ctx.createOscillator(); this.sawLFOGain = this.ctx.createGain();
    this.sawLFO.type = 'sine'; this.sawLFO.frequency.setValueAtTime(4, now); this.sawLFOGain.gain.setValueAtTime(15, now);
    const osc1 = this.ctx.createOscillator(), g1 = this.ctx.createGain();
    osc1.type = 'square'; osc1.frequency.setValueAtTime(85, now); g1.gain.setValueAtTime(0.08, now);
    const osc2 = this.ctx.createOscillator(), g2 = this.ctx.createGain();
    osc2.type = 'sine'; osc2.frequency.setValueAtTime(170, now); g2.gain.setValueAtTime(0.04, now);
    const osc3 = this.ctx.createOscillator(), g3 = this.ctx.createGain();
    osc3.type = 'sawtooth'; osc3.frequency.setValueAtTime(42.5, now); g3.gain.setValueAtTime(0.05, now);
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.setValueAtTime(350, now); filter.Q.setValueAtTime(2, now);
    const masterGain = this.ctx.createGain();
    masterGain.gain.setValueAtTime(Settings.muted ? 0 : 0.15, now);
    Settings.sfxGainNode = masterGain;
    this.sawLFO.connect(this.sawLFOGain); this.sawLFOGain.connect(osc1.frequency); this.sawLFOGain.connect(osc2.frequency); this.sawLFOGain.connect(osc3.frequency);
    osc1.connect(g1); g1.connect(filter); osc2.connect(g2); g2.connect(filter); osc3.connect(g3); g3.connect(filter);
    filter.connect(masterGain); masterGain.connect(this.ctx.destination);
    osc1.start(); osc2.start(); osc3.start(); this.sawLFO.start();
    this.sawNodes = [osc1, osc2, osc3, this.sawLFO]; this.sawGains = [g1, g2, g3, masterGain];
  },
  stopSawHum() {
    if (!this.sawActive) return; this.sawActive = false;
    const now = this.ctx.currentTime;
    if (this.sawGains.length > 0) { const master = this.sawGains[this.sawGains.length - 1]; master.gain.setValueAtTime(master.gain.value, now); master.gain.exponentialRampToValueAtTime(0.001, now + 0.5); }
    setTimeout(() => { this.sawNodes.forEach(n => { try { n.stop(); } catch (e) {} }); this.sawNodes = []; this.sawGains = []; if (this.sawLFO) { try { this.sawLFO.stop(); } catch (e) {} this.sawLFO = null; } if (this.sawLFOGain) { this.sawLFOGain = null; } }, 500);
  },
  startSpikeHum() {
    this.init(); if (this.spikeActive) return; this.spikeActive = true;
    const now = this.ctx.currentTime;
    this.spikeLFO = this.ctx.createOscillator();
    const lfoGain = this.ctx.createGain();
    this.spikeLFO.type = 'sine'; this.spikeLFO.frequency.setValueAtTime(8, now); lfoGain.gain.setValueAtTime(20, now);
    const osc1 = this.ctx.createOscillator(), g1 = this.ctx.createGain();
    osc1.type = 'sawtooth'; osc1.frequency.setValueAtTime(65, now); g1.gain.setValueAtTime(0.1, now);
    const osc2 = this.ctx.createOscillator(), g2 = this.ctx.createGain();
    osc2.type = 'square'; osc2.frequency.setValueAtTime(130, now); g2.gain.setValueAtTime(0.05, now);
    const osc3 = this.ctx.createOscillator(), g3 = this.ctx.createGain();
    osc3.type = 'sine'; osc3.frequency.setValueAtTime(32.5, now); g3.gain.setValueAtTime(0.08, now);
    this.spikeFilter = this.ctx.createBiquadFilter();
    this.spikeFilter.type = 'lowpass'; this.spikeFilter.frequency.setValueAtTime(200, now); this.spikeFilter.Q.setValueAtTime(3, now);
    const masterGain = this.ctx.createGain();
    masterGain.gain.setValueAtTime(0, now);
    masterGain.gain.linearRampToValueAtTime(Settings.muted ? 0 : 0.12, now + 0.5);
    this.spikeLFO.connect(lfoGain); lfoGain.connect(this.spikeFilter.frequency);
    osc1.connect(g1); g1.connect(this.spikeFilter); osc2.connect(g2); g2.connect(this.spikeFilter); osc3.connect(g3); g3.connect(this.spikeFilter);
    this.spikeFilter.connect(masterGain); masterGain.connect(this.ctx.destination);
    osc1.start(); osc2.start(); osc3.start(); this.spikeLFO.start();
    this.spikeNodes = [osc1, osc2, osc3, this.spikeLFO]; this.spikeGains = [g1, g2, g3, masterGain];
  },
  stopSpikeHum() {
    if (!this.spikeActive) return; this.spikeActive = false;
    const now = this.ctx.currentTime;
    if (this.spikeGains.length > 0) { const master = this.spikeGains[this.spikeGains.length - 1]; master.gain.setValueAtTime(master.gain.value, now); master.gain.exponentialRampToValueAtTime(0.001, now + 0.3); }
    setTimeout(() => { this.spikeNodes.forEach(n => { try { n.stop(); } catch (e) {} }); this.spikeNodes = []; this.spikeGains = []; if (this.spikeLFO) { try { this.spikeLFO.stop(); } catch (e) {} this.spikeLFO = null; } this.spikeFilter = null; }, 300);
  },
  playTone(freqStart, freqEnd, dur, type, volMult) {
    if (Settings.muted) return; this.init();
    const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freqStart, this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freqEnd, this.ctx.currentTime + dur);
    gain.gain.setValueAtTime(0.15 * volMult, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(); osc.stop(this.ctx.currentTime + dur);
  },
  jump() { this.playTone(150, 600, 0.15, 'square', 1); },
  spikeFall() { this.playTone(200, 50, 0.4, 'sawtooth', 1.3); },
  button() { this.playTone(800, 1200, 0.15, 'sine', 1.3); },
  gameOver() { this.playTone(150, 30, 1.0, 'sawtooth', 1.3); },
  damage() {
    if (Settings.muted) return; this.init();
    const bufferSize = this.ctx.sampleRate * 0.2;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = this.ctx.createBufferSource(); noise.buffer = buffer;
    const noiseGain = this.ctx.createGain();
    noiseGain.gain.setValueAtTime(0.2, this.ctx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.2);
    noise.connect(noiseGain); noiseGain.connect(this.ctx.destination); noise.start();
    const osc = this.ctx.createOscillator(), oscGain = this.ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.3);
    oscGain.gain.setValueAtTime(0.2, this.ctx.currentTime);
    oscGain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
    osc.connect(oscGain); oscGain.connect(this.ctx.destination);
    osc.start(); osc.stop(this.ctx.currentTime + 0.3);
  },
  spikeKill() {
    if (Settings.muted) return; this.init();
    const bufferSize = this.ctx.sampleRate * 0.3;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = this.ctx.createBufferSource(); noise.buffer = buffer;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.25, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
    noise.connect(gain); gain.connect(this.ctx.destination); noise.start();
  },
  doorCreak() {
    if (Settings.muted) return; this.init();
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(200, now + 0.3);
    osc.frequency.linearRampToValueAtTime(350, now + 0.5);
    osc.frequency.exponentialRampToValueAtTime(150, now + 0.8);
    gain.gain.setValueAtTime(0.1, now);
    gain.gain.linearRampToValueAtTime(0.15, now + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(); osc.stop(now + 0.8);
    const bufferSize = this.ctx.sampleRate * 0.5;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const d = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) d[i] = Math.random() * 2 - 1;
    const noise = this.ctx.createBufferSource(); noise.buffer = buffer;
    const nGain = this.ctx.createGain();
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.setValueAtTime(800, now);
    filter.frequency.exponentialRampToValueAtTime(200, now + 0.5); filter.Q.setValueAtTime(5, now);
    nGain.gain.setValueAtTime(0.05, now);
    nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    noise.connect(filter); filter.connect(nGain); nGain.connect(this.ctx.destination); noise.start();
  },
  win() {
    if (Settings.muted) return; this.init();
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
      const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, this.ctx.currentTime + i * 0.12);
      gain.gain.setValueAtTime(0, this.ctx.currentTime + i * 0.12);
      gain.gain.linearRampToValueAtTime(0.15, this.ctx.currentTime + i * 0.12 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + i * 0.12 + 0.3);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(this.ctx.currentTime + i * 0.12); osc.stop(this.ctx.currentTime + i * 0.12 + 0.3);
    });
  },
  levelUp() {
    if (Settings.muted) return; this.init();
    const notes = [392.00, 523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
      const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, this.ctx.currentTime + i * 0.1);
      gain.gain.setValueAtTime(0, this.ctx.currentTime + i * 0.1);
      gain.gain.linearRampToValueAtTime(0.2, this.ctx.currentTime + i * 0.1 + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + i * 0.1 + 0.4);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(this.ctx.currentTime + i * 0.1); osc.stop(this.ctx.currentTime + i * 0.1 + 0.4);
    });
  },
  updateMute() {
    const now = this.ctx ? this.ctx.currentTime : 0;
    if (Settings.bgmGainNode && this.ctx) { try { Settings.bgmGainNode.gain.setTargetAtTime(Settings.muted ? 0 : 0.08, now, 0.1); } catch(e) {} }
    if (Settings.sfxGainNode && this.ctx) { try { Settings.sfxGainNode.gain.setTargetAtTime(Settings.muted ? 0 : 0.15, now, 0.1); } catch(e) {} }
    if (this.spikeActive && this.spikeGains.length > 0 && this.ctx) { const master = this.spikeGains[this.spikeGains.length - 1]; try { master.gain.setTargetAtTime(Settings.muted ? 0 : 0.12, now, 0.1); } catch(e) {} }
    if (this.sawActive && this.sawGains.length > 0 && this.ctx) { const master = this.sawGains[this.sawGains.length - 1]; try { master.gain.setTargetAtTime(Settings.muted ? 0 : 0.15, now, 0.1); } catch(e) {} }
  }
};

const GAME_CONFIG = { LIVES_START: 5, INVINCIBLE_DURATION: 2000, STUN_DURATION: 2000, PLAYER_JUMP_POWER: 530, STATIC_SAW_SPEED_CAP: 1.5 };
let gameScene, player, spike, lavaCover, lavaCoverBody, lavaCoverCollider;
let lavaButton, btnBase, buttonPressed = false, doorContainer, doorFrame, doorGlow, doorOpen = false;
let finishZone, lavaZone, winParticles = null;
let isInvincible = false, spikeAlive = true, spikeStunned = false, spikeFallingToLava = false;
let saws = [], lives = GAME_CONFIG.LIVES_START;
let gameWon = false, gameOverActive = false, levelTransition = false;
let invincibleTimer, stunTimer, blinkTimer;
let keys = { left: false, right: false, up: false, down: false, space: false };
let spikeVelX = 0;
let playerOnButton = false;
let lavaGfx, lavaBubbles = [], heartIcons = [], damageFlash;
let currentLevel = 1;
let totalLevels = 2;
let movingPlatforms = [], lasers = [], bats = [], windZones = [];
let lavaGlow;
let bgStars = [];

const LEVELS = {
  1: {
    bg: '#0a0e1a',
    groundTop: 560,
    startPos: { x: 80, y: 512 },
    hasLava: true,
    lavaLeft: 300, lavaRight: 500, lavaCenter: 400,
    hasButton: true,
    buttonPos: { x: 300, y: 420 },
    doorPos: { x: 660, y: 240 },
    staticPlats: [
      { x: 180, y: 490 }, { x: 300, y: 430 }, { x: 420, y: 370 },
      { x: 540, y: 310 }, { x: 660, y: 250 }
    ],
    staticSaws: [
      { x: 370, y: 350, scale: 0.4, speed: 1.2 },
      { x: 590, y: 290, scale: 0.4, speed: -1.2 }
    ],
    hasSpike: true,
    spikeRespawn: { x: 700, y: 544 },
    movingPlats: [],
    lasers: [],
    bats: [],
    windZones: [],
    groundSegments: [
      { x: 150, w: 300 }, { x: 650, w: 300 }
    ]
  },
  2: {
    bg: '#0a1210',
    groundTop: 560,
    startPos: { x: 60, y: 512 },
    hasLava: true,
    lavaLeft: 200, lavaRight: 600, lavaCenter: 400,
    hasButton: false,
    buttonPos: null,
    doorPos: { x: 740, y: 150 },
    staticPlats: [
      { x: 160, y: 480 }, { x: 320, y: 420 }, { x: 480, y: 360 },
      { x: 200, y: 320 }, { x: 400, y: 260 }, { x: 600, y: 200 },
      { x: 740, y: 180 }
    ],
    staticSaws: [
      { x: 260, y: 450, scale: 0.35, speed: 1.5 },
      { x: 440, y: 390, scale: 0.35, speed: -1.5 }

function getLevelData() { return LEVELS[currentLevel] || LEVELS[1]; }

const config = {
  type: Phaser.AUTO, width: 800, height: 600, backgroundColor: '#0a0e1a', parent: 'gameWrapper',
  physics: { default: 'arcade', arcade: { gravity: { y: 860 }, debug: false } },
  scene: { init: sceneInit, preload: scenePreload, create: sceneCreate, update: sceneUpdate }
};

function sceneInit() {
  isInvincible = false; spikeAlive = true; spikeStunned = false; spikeFallingToLava = false;
  saws = []; lives = GAME_CONFIG.LIVES_START; buttonPressed = false; gameWon = false; gameOverActive = false;
  levelTransition = false;
  winParticles = null; doorOpen = false; spikeVelX = 0; lavaBubbles = []; heartIcons = [];
  movingPlatforms = []; lasers = []; bats = []; windZones = []; bgStars = [];
  keys = { left: false, right: false, up: false, down: false, space: false };
  if (invincibleTimer) invincibleTimer.remove();
  if (stunTimer) stunTimer.remove();
  if (blinkTimer) blinkTimer.remove();

  lavaCover = null; lavaCoverBody = null; lavaCoverCollider = null;
  lavaButton = null; btnBase = null;
  doorContainer = null; doorFrame = null; doorGlow = null;
  finishZone = null; lavaZone = null;
  spike = null; lavaGfx = null; lavaGlow = null;
  damageFlash = null; gameScene = null;
}

function scenePreload() {
  this.load.spritesheet('dude', 'https://labs.phaser.io/assets/sprites/dude.png', { frameWidth: 32, frameHeight: 48 });
  this.load.image('spike', 'https://labs.phaser.io/assets/sprites/spikedball.png');
  this.load.image('saw', 'https://labs.phaser.io/assets/sprites/saw.png');
}

function drawPlatform(gfx, cx, cy, w, h) {
  const x = cx - w/2, y = cy - h/2;
  gfx.fillStyle(0x000000, 0.3);
  gfx.fillRect(x + 4, y + h + 3, w, 6);
  gfx.fillStyle(0x3E2723);
  gfx.fillRect(x, y + h - 4, w, 4);
  gfx.fillStyle(0x4E342E);
  gfx.fillRect(x + w - 4, y, 4, h);
  gfx.fillStyle(0x5D4037);
  gfx.fillRect(x, y, 4, h);
  gfx.fillStyle(0x6D4C41);
  gfx.fillRect(x + 4, y + 4, w - 8, h - 8);
  gfx.fillStyle(0x8D6E63);
  gfx.fillRect(x + 4, y, w - 8, 4);
  gfx.fillStyle(0xA1887F, 0.45);
  gfx.fillRect(x + 8, y + 6, w - 16, 2);
  gfx.fillStyle(0x4E342E, 0.4);
  for (let i = x + 14; i < x + w - 8; i += 20) gfx.fillRect(i, y + 9, 1.5, h - 15);
  gfx.fillStyle(0x3E2723);
  const bolts = [[x+7,y+7],[x+w-7,y+7],[x+7,y+h-7],[x+w-7,y+h-7]];
  bolts.forEach(([bx,by])=>{
    gfx.fillCircle(bx, by, 2.5);
    gfx.fillStyle(0x8D6E63, 0.6); gfx.fillCircle(bx-0.5, by-0.5, 1.2); gfx.fillStyle(0x3E2723);
  });
}

function createHeart(scene, x, y, scale = 1) {
  const container = scene.add.container(x, y);
  const g = scene.add.graphics();
  const s = 11 * scale;
  g.fillStyle(0xFF5252, 0.2);
  g.fillCircle(0, 0, s * 1.4);
  g.fillStyle(0xFF5252);
  g.fillCircle(-s * 0.5, -s * 0.25, s * 0.55);
  g.fillCircle(s * 0.5, -s * 0.25, s * 0.55);
  g.fillTriangle(-s * 1.05, -s * 0.05, s * 1.05, -s * 0.05, 0, s * 1.0);
  g.fillStyle(0xFF8A80, 0.8);
  g.fillCircle(-s * 0.22, -s * 0.05, s * 0.2);
  container.add(g);
  return container;
}

function drawHearts(scene) {
  heartIcons.forEach(h => h.destroy());
  heartIcons = [];
  for (let i = 0; i < lives; i++) {
    const h = createHeart(scene, 24 + i * 30, 26);
    h.setDepth(1000);
    heartIcons.push(h);
  }
}

function drawLavaCover(scene, ld) {
  if (!ld.hasLava || !lavaCover) return;
  lavaCover.clear();
  const w = ld.lavaRight - ld.lavaLeft;
  const plankW = w / 6;
  for (let i = 0; i < 6; i++) {
    const px = ld.lavaLeft + i * plankW;
    lavaCover.fillStyle(0x000000, 0.35);
    lavaCover.fillRect(px + 1, ld.groundTop - 6, plankW - 2, 22);
    lavaCover.fillStyle(0x5D4037);
    lavaCover.fillRect(px, ld.groundTop - 10, plankW - 2, 20);
    lavaCover.fillStyle(0x8D6E63);
    lavaCover.fillRect(px, ld.groundTop - 10, plankW - 2, 3);
    lavaCover.fillStyle(0x3E2723);
    lavaCover.fillRect(px, ld.groundTop + 7, plankW - 2, 3);
    lavaCover.fillStyle(0x4E342E, 0.3);
    lavaCover.fillRect(px + 4, ld.groundTop - 6, 1, 12);
    lavaCover.fillRect(px + plankW - 6, ld.groundTop - 6, 1, 12);
    lavaCover.fillStyle(0x3E2723);
    lavaCover.fillCircle(px + plankW/2 - 1, ld.groundTop, 1.5);
    lavaCover.fillStyle(0xA1887F, 0.5);
    lavaCover.fillCircle(px + plankW/2 - 1.5, ld.groundTop - 0.5, 0.8);
  }
  lavaCover.fillStyle(0x4E342E);
  lavaCover.fillRect(ld.lavaLeft - 4, ld.groundTop - 12, 4, 24);
  lavaCover.fillRect(ld.lavaRight, ld.groundTop - 12, 4, 24);
}

// ===== BIRD TEXTURE GENERATOR =====
function generateBirdTexture(scene) {
  if (scene.textures.exists('bird')) return;
  
  const size = 48;
  const gfx = scene.make.graphics({x:0,y:0,add:false});
  
  // Body - orange/yellow bird
  gfx.fillStyle(0xFF9800);
  gfx.fillEllipse(size/2, size/2 + 2, 22, 16);
  
  // Belly - lighter
  gfx.fillStyle(0xFFCC80);
  gfx.fillEllipse(size/2, size/2 + 6, 14, 10);
  
  // Head
  gfx.fillStyle(0xFF9800);
  gfx.fillCircle(size/2 + 8, size/2 - 6, 9);
  
  // Eye white
  gfx.fillStyle(0xFFFFFF);
  gfx.fillCircle(size/2 + 10, size/2 - 8, 4);
  
  // Eye pupil
  gfx.fillStyle(0x212121);
  gfx.fillCircle(size/2 + 11, size/2 - 8, 2);
  
  // Eye shine
  gfx.fillStyle(0xFFFFFF);
  gfx.fillCircle(size/2 + 12, size/2 - 9, 1);
  
  // Beak
  gfx.fillStyle(0xFF5722);
  gfx.fillTriangle(size/2 + 16, size/2 - 6, size/2 + 24, size/2 - 4, size/2 + 16, size/2 - 2);
  
  // Wing (left, darker)
  gfx.fillStyle(0xE65100);
  gfx.fillEllipse(size/2 - 4, size/2, 14, 8);
  
  // Wing highlight
  gfx.fillStyle(0xFFB74D);
  gfx.fillEllipse(size/2 - 2, size/2 - 1, 10, 5);
  
  // Tail feathers
  gfx.fillStyle(0xE65100);
  gfx.fillTriangle(size/2 - 12, size/2 + 2, size/2 - 20, size/2 - 2, size/2 - 12, size/2 + 6);
  gfx.fillTriangle(size/2 - 12, size/2 + 4, size/2 - 18, size/2 + 6, size/2 - 12, size/2 + 8);
  
  // Legs
  gfx.fillStyle(0xFF5722);
  gfx.fillRect(size/2 - 3, size/2 + 10, 2, 5);
  gfx.fillRect(size/2 + 1, size/2 + 10, 2, 5);
  
  // Outline glow for visibility
  gfx.lineStyle(1.5, 0xFFE0B2, 0.6);
  gfx.strokeEllipse(size/2, size/2 + 2, 22, 16);
  gfx.strokeCircle(size/2 + 8, size/2 - 6, 9);
  
  gfx.generateTexture('bird', size, size);
}

function sceneCreate() {
  gameScene = this;
  const ld = getLevelData();
  this.cameras.main.setBackgroundColor(ld.bg);
  this.game.canvas.setAttribute('tabindex', '0');
  this.game.canvas.focus();
  this.physics.world.setBounds(0, 0, 800, 1000);

  // ===== ENHANCED BACKGROUND =====
  // Gradient background overlay
  const bgGfx = this.add.graphics();
  bgGfx.setDepth(-10);
  // Soft radial glow in center for visibility
  bgGfx.fillGradientStyle(0x1a237e, 0x1a237e, 0x0d47a1, 0x0d47a1, 0.15);
  bgGfx.fillRect(0, 0, 800, 600);
  
  // Nebula-like patches
  for (let i = 0; i < 5; i++) {
    const nx = 100 + Math.random() * 600;
    const ny = 50 + Math.random() * 400;
    const nr = 60 + Math.random() * 100;
    bgGfx.fillStyle(0x4a148c, 0.06);
    bgGfx.fillCircle(nx, ny, nr);
    bgGfx.fillStyle(0x1a237e, 0.08);
    bgGfx.fillCircle(nx + 20, ny + 10, nr * 0.6);
  }

  // Stars with twinkle
  const starGfx = this.make.graphics({x:0,y:0,add:false});
  starGfx.fillStyle(0xffffff, 1); 
  starGfx.fillCircle(3, 3, 3);
  starGfx.fillStyle(0xFFE0B2, 0.8);
  starGfx.fillCircle(3, 3, 1.5);
  starGfx.generateTexture('star_glow', 6, 6);
  
  for (let i = 0; i < 80; i++) {
    const sx = 20 + Math.random() * 760;
    const sy = 20 + Math.random() * 450;
    const star = this.add.image(sx, sy, 'star_glow');
    const baseAlpha = 0.4 + Math.random() * 0.6;
    star.setAlpha(baseAlpha);
    star.setScale(0.4 + Math.random() * 0.8);
    star.setDepth(-5);
    // Store for twinkle animation
    bgStars.push({ 
      sprite: star, 
      baseAlpha: baseAlpha, 
      phase: Math.random() * Math.PI * 2,
      speed: 0.5 + Math.random() * 1.5
    });
  }

  const groundGfx = this.add.graphics();
  groundGfx.setDepth(10);
  if (ld.hasLava) {
    groundGfx.fillStyle(0x0d0806);
    groundGfx.fillRect(ld.lavaLeft, ld.groundTop + 5, ld.lavaRight - ld.lavaLeft, 40);
  }
  ld.groundSegments.forEach(seg => {
    const left = seg.x - seg.w/2;
    groundGfx.fillStyle(0x3E2723); groundGfx.fillRect(left, ld.groundTop + 10, seg.w, 30);
    groundGfx.fillStyle(0x5D4037); groundGfx.fillRect(left, ld.groundTop + 2, seg.w, 8);
    groundGfx.fillStyle(0x66BB6A); groundGfx.fillRect(left, ld.groundTop, seg.w, 4);
    groundGfx.fillStyle(0x388E3C); groundGfx.fillRect(left, ld.groundTop + 4, seg.w, 3);
    groundGfx.fillStyle(0x43A047);
    for (let gx = left + 5; gx < left + seg.w - 5; gx += 8 + Math.random()*6) {
      const gh = 3 + Math.random()*4;
      groundGfx.fillRect(gx, ld.groundTop - gh, 2, gh);
    }
  });

  const groundZones = [];
  ld.groundSegments.forEach(seg => {
    const z = this.add.rectangle(seg.x, ld.groundTop + 20, seg.w, 40);
    this.physics.add.existing(z, true); z.body.updateFromGameObject(); groundZones.push(z);
  });

  lavaGfx = this.add.graphics();
  lavaGfx.setDepth(5);
  if (ld.hasLava) {
    lavaGlow = this.add.graphics();
    lavaGlow.setDepth(4);
  }

  if (ld.hasLava && ld.hasButton) {
    lavaCover = this.add.graphics();
    lavaCover.setDepth(15);
    drawLavaCover(this, ld);
    lavaCoverBody = this.add.rectangle(ld.lavaCenter, ld.groundTop, ld.lavaRight - ld.lavaLeft, 20);
    this.physics.add.existing(lavaCoverBody, true); lavaCoverBody.body.updateFromGameObject(); lavaCoverBody.setVisible(false);
  }

  const platZones = [];
  const platGfx = this.add.graphics();
  platGfx.setDepth(10);
  for (const p of ld.staticPlats) {
    drawPlatform(platGfx, p.x, p.y, 100, 20);
    const z = this.add.rectangle(p.x, p.y, 100, 20);
    this.physics.add.existing(z, true); z.body.updateFromGameObject(); platZones.push(z);
  }

  if (ld.movingPlats) {
    for (const mp of ld.movingPlats) {
      const mg = this.add.graphics();
      mg.setDepth(10);
      drawPlatform(mg, mp.x, mp.y, mp.w, mp.h);
      const body = this.add.rectangle(mp.x, mp.y, mp.w, mp.h);
      this.physics.add.existing(body, false);
      body.body.setImmovable(true);
      body.body.setAllowGravity(false);
      body.body.moves = false;
      platZones.push(body);
      movingPlatforms.push({
        gfx: mg, body: body,
        origX: mp.x, origY: mp.y,
        axis: mp.axis, range: mp.range, speed: mp.speed,
        w: mp.w, h: mp.h,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  drawHearts(this);

  damageFlash = this.add.rectangle(400, 300, 800, 600, 0xFF0000, 0);
  damageFlash.setDepth(2000);

  if (!this.anims.exists('left')) this.anims.create({ key: 'left', frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }), frameRate: 10, repeat: -1 });
  if (!this.anims.exists('turn')) this.anims.create({ key: 'turn', frames: [{ key: 'dude', frame: 4 }] });
  if (!this.anims.exists('right')) this.anims.create({ key: 'right', frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }), frameRate: 10, repeat: -1 });

  player = this.physics.add.sprite(ld.startPos.x, ld.startPos.y, 'dude');
  player.setDepth(100);
  player.setCollideWorldBounds(true); player.body.setSize(30, 46); player.setBounce(0.1);
  groundZones.forEach(z => this.physics.add.collider(player, z));
  if (lavaCoverBody) lavaCoverCollider = this.physics.add.collider(player, lavaCoverBody);
  platZones.forEach(z => this.physics.add.collider(player, z));

  if (ld.hasButton && ld.buttonPos) {
    const btnX = ld.buttonPos.x, btnY = ld.buttonPos.y, btnR = 6;
    btnBase = this.add.graphics();
    btnBase.setDepth(100);
    btnBase.fillStyle(0x263238); btnBase.fillRoundedRect(btnX - 12, btnY - 2, 24, 5, 2);
    btnBase.lineStyle(1, 0x455A64); btnBase.strokeRoundedRect(btnX - 12, btnY - 2, 24, 5, 2);

    lavaButton = this.add.container(btnX, btnY - 5);
    lavaButton.setDepth(100);
    const buttonDome = this.add.graphics();
    buttonDome.fillStyle(0xB71C1C); buttonDome.fillCircle(0, 1.5, btnR);
    buttonDome.fillStyle(0xE53935); buttonDome.fillCircle(0, 0.5, btnR);
    buttonDome.fillStyle(0xFF8A80); buttonDome.fillCircle(-2.5, -2, 2.5);
    buttonDome.lineStyle(1.5, 0x8B0000, 0.6);
    buttonDome.strokeCircle(0, 0.5, btnR);
    lavaButton.add(buttonDome);

    const buttonZone = this.add.zone(btnX, btnY - 4, 18, 16);
    this.physics.add.existing(buttonZone, true);
    this.physics.add.overlap(player, buttonZone, () => { playerOnButton = true; });
    // Button hint text
    const btnHint = this.add.text(btnX, btnY - 28, '↓', { fontSize: '16px', fontFamily: 'monospace', color: '#ffb74d' }).setOrigin(0.5).setAlpha(0).setDepth(101);
    this.time.addEvent({ delay: 100, loop: true, callback: () => { btnHint.setAlpha(playerOnButton && !buttonPressed ? 1 : 0); } });
  }

  if (ld.hasSpike && ld.spikeRespawn) {
    spike = this.physics.add.sprite(ld.spikeRespawn.x, ld.spikeRespawn.y, 'spike');
    spike.setDepth(100);
    spike.setScale(0.5); spike.setOrigin(0.5, 0.5);
    spike.body.setAllowGravity(false); spike.body.setImmovable(true); spike.body.setSize(16, 16);
    this.physics.add.overlap(player, spike, () => {
      if (!spikeAlive || isInvincible || spikeFallingToLava) return;
      if (player.body.velocity.y > 0 && player.y + 20 > spike.y && player.y < spike.y + 10) killSpike();
      else takeDamage();
    });
    Audio.startSpikeHum();
  } else {
    spike = null;
  }

  function addStaticSaw(x, y, scaleVal, speedVal) {
    const saw = this.add.sprite(x, y, 'saw').setScale(scaleVal);
    saw.setDepth(100);
    this.physics.add.existing(saw, true);
    saw.body.setCircle(16 * scaleVal); saw.body.updateFromGameObject();
    this.physics.add.overlap(player, saw, () => { if (!isInvincible && lives > 0) takeDamage(); });
    saws.push({ sprite: saw, speed: Math.min(GAME_CONFIG.STATIC_SAW_SPEED_CAP, Math.abs(speedVal)) * Math.sign(speedVal) });
  }
  for (const s of ld.staticSaws) {
    addStaticSaw.call(this, s.x, s.y, s.scale, s.speed);
  }
  Audio.startSawHum();

  if (ld.lasers) {
    for (const l of ld.lasers) {
      const g = this.add.graphics();
      g.setDepth(100);
      const zone = this.add.zone(l.x, l.y, l.w, l.h);
      this.physics.add.existing(zone, true);
      this.physics.add.overlap(player, zone, () => { if (!isInvincible && lives > 0) takeDamage(); });
      lasers.push({
        gfx: g, zone: zone,
        x: l.x, y: l.y, w: l.w, h: l.h,
        onTime: l.onTime, offTime: l.offTime,
        active: true, timer: 0, lastState: true
      });
    }
  }

  // ===== BIRDS (replaced bats) =====
  if (ld.bats) {
    generateBirdTexture(this);
    for (const b of ld.bats) {
      const bird = this.add.sprite(b.x, b.y, 'bird');
      bird.setDepth(100);
      bird.setScale(0.9);
      this.physics.add.existing(bird, false);
      bird.body.setImmovable(true);
      bird.body.setAllowGravity(false);
      bird.body.moves = false;
      bird.body.setSize(28, 24);
      this.physics.add.overlap(player, bird, () => { if (!isInvincible && lives > 0) takeDamage(); });
      bats.push({ 
        sprite: bird, 
        origX: b.x, origY: b.y, 
        range: b.range, speed: b.speed, 
        phase: Math.random() * Math.PI * 2 
      });
    }
  }

  if (ld.windZones) {
    for (const w of ld.windZones) {
      const g = this.add.graphics();
      g.setDepth(3);
      windZones.push({ gfx: g, x: w.x, y: w.y, w: w.w, h: w.h, forceX: w.forceX });
    }
  }

  const dX = ld.doorPos.x, dY = ld.doorPos.y, dW = 18, dH = 30;
  doorFrame = this.add.graphics();
  doorFrame.setDepth(100);
  doorFrame.fillStyle(0x3E2723); doorFrame.fillRect(dX - dW/2 - 2, dY, dW + 4, 3);
  doorFrame.fillStyle(0x4E342E); doorFrame.fillRect(dX - dW/2 - 2, dY - dH, 2, dH + 3);
  doorFrame.fillRect(dX + dW/2, dY - dH, 2, dH + 3);
  doorFrame.fillRect(dX - dW/2 - 2, dY - dH, dW + 4, 2);
  doorFrame.lineStyle(0.5, 0x3E2723); doorFrame.lineBetween(dX - dW/2 - 2, dY - 1, dX + dW/2 + 2, dY - 1);

  doorContainer = this.add.container(dX - dW/2, dY);
  doorContainer.setDepth(100);
  const doorPanel = this.add.graphics();
  doorPanel.fillStyle(0x4E342E); doorPanel.fillRect(0, -dH, dW, dH);
  doorPanel.fillStyle(0x6D4C41); doorPanel.fillRect(1, -dH + 1, 7, dH - 2); doorPanel.fillRect(9, -dH + 1, 8, dH - 2);
  doorPanel.lineStyle(1, 0x3E2723); doorPanel.lineBetween(8.5, -dH + 1, 8.5, -1);
  doorPanel.lineStyle(0.5, 0x3E2723, 0.3);
  for (let i = -dH + 5; i < -2; i += 5) doorPanel.lineBetween(1, i, dW - 1, i);
  doorPanel.fillStyle(0x757575); doorPanel.fillRect(-1, -dH + 4, 2, 3); doorPanel.fillRect(-1, -5, 2, 3);
  doorPanel.fillStyle(0xBDBDBD); doorPanel.fillCircle(dW - 4, -dH/2, 2.5);
  doorPanel.fillStyle(0xFFFFFF); doorPanel.fillCircle(dW - 5, -dH/2 - 1, 1);
  doorContainer.add(doorPanel);

  doorGlow = this.add.graphics();
  doorGlow.setDepth(100);
  doorGlow.fillStyle(0x00E676, 0); doorGlow.fillRect(dX + dW/2 - 1, dY - dH + 2, 3, dH - 4);

  finishZone = this.add.zone(dX, dY - dH/2, dW + 2, dH);
  this.physics.add.existing(finishZone, true);
  this.physics.add.overlap(player, finishZone, () => { if (!gameWon && !doorOpen && !levelTransition) openDoor(this); });

  if (ld.hasLava) {
    lavaZone = this.add.zone(ld.lavaCenter, ld.groundTop + 30, ld.lavaRight - ld.lavaLeft, 20);
    this.physics.add.existing(lavaZone, true);
    this.physics.add.overlap(player, lavaZone, () => { 
      if (!isInvincible && lives > 0 && (!lavaCover || buttonPressed)) takeDamage(); 
    });
  }

  window.addEventListener('keydown', handleKeyDown);
  window.addEventListener('keyup', handleKeyUp);
  this.events.on('shutdown', () => {
    window.removeEventListener('keydown', handleKeyDown);
    window.removeEventListener('keyup', handleKeyUp);
    movingPlatforms = []; lasers = []; bats = []; windZones = []; saws = []; bgStars = [];
  });
}

function sceneUpdate() {
  const time = this.time.now;
  const ld = getLevelData();

  // Twinkle stars
  for (const s of bgStars) {
    const twinkle = Math.sin(time * 0.001 * s.speed + s.phase) * 0.3 + 0.7;
    s.sprite.setAlpha(s.baseAlpha * twinkle);
  }

  for (const saw of saws) saw.sprite.angle += saw.speed;

  for (const mp of movingPlatforms) {
    const t = time * 0.001 * mp.speed + mp.phase;
    let nx = mp.origX, ny = mp.origY;
    if (mp.axis === 'x') nx += Math.sin(t) * mp.range;
    else ny += Math.sin(t) * mp.range;
    
    mp.body.x = nx;
    mp.body.y = ny;
    mp.body.body.updateFromGameObject();
    
    mp.gfx.clear();
    drawPlatform(mp.gfx, nx, ny, mp.w, mp.h);
  }

  for (const l of lasers) {
    l.timer += 16;
    const cycle = l.onTime + l.offTime;
    const phase = l.timer % cycle;
    const wasActive = l.active;
    l.active = phase < l.onTime;
    if (l.active !== l.lastState) {
      l.lastState = l.active;
      l.gfx.clear();
      if (l.active) {
        l.gfx.fillStyle(0xFF1744, 0.3);
        l.gfx.fillRect(l.x - l.w/2 - 3, l.y - l.h/2 - 3, l.w + 6, l.h + 6);
        l.gfx.fillStyle(0xFF5252, 0.95);
        l.gfx.fillRect(l.x - l.w/2, l.y - l.h/2, l.w, l.h);
        l.gfx.fillStyle(0xFFFFFF, 0.7);
        l.gfx.fillRect(l.x - l.w/2 + 1, l.y - l.h/2 + 1, l.w - 2, l.h - 2);
      }
    }
    l.zone.body.enable = l.active;
  }

  // ===== BIRD ANIMATION =====
  for (const b of bats) {
    const t = time * 0.001 * b.speed + b.phase;
    const nx = b.origX + Math.sin(t) * b.range;
    const ny = b.origY + Math.sin(t * 2.3) * 15;
    const prevX = b.sprite.x;
    b.sprite.x = nx;
    b.sprite.y = ny;
    b.sprite.body.updateFromGameObject();
    if (nx > prevX + 0.1) b.sprite.setFlipX(false);
    else if (nx < prevX - 0.1) b.sprite.setFlipX(true);
    
    // Wing flap via scaleY + slight rotation for flying feel
    const flap = Math.sin(time * 0.012);
    b.sprite.scaleY = 0.9 + flap * 0.12;
    b.sprite.scaleX = 0.9 - flap * 0.05;
    b.sprite.angle = Math.sin(t) * 8;
    
    // Bobbing shadow effect below bird
    b.sprite.setTint(flap > 0 ? 0xFFFFFF : 0xFFE0B2);
  }

  if (Math.floor(time / 80) % 5 === 0) {
    for (const w of windZones) {
      w.gfx.clear();
      w.gfx.fillStyle(0x81D4FA, 0.08);
      w.gfx.fillRect(w.x - w.w/2, w.y - w.h/2, w.w, w.h);
      const windDir = w.forceX > 0 ? 1 : -1;
      for (let i = 0; i < 3; i++) {
        const px = w.x - w.w/2 + ((time * 0.05 + i * 40) % w.w);
        const py = w.y - w.h/2 + 15 + i * (w.h/3);
        w.gfx.fillStyle(0xB3E5FC, 0.25);
        w.gfx.fillRect(px, py, 12 * windDir, 2);
      }
    }
  }

  if (ld.hasLava) {
    lavaGfx.clear();
    if (lavaGlow) lavaGlow.clear();

    const lw = ld.lavaRight - ld.lavaLeft;

    if (lavaGlow) {
      lavaGlow.fillStyle(0xFF3D00, 0.08);
      lavaGlow.fillRect(ld.lavaLeft - 30, ld.groundTop - 20, lw + 60, 70);
      lavaGlow.fillStyle(0xFF6D00, 0.12);
      lavaGlow.fillRect(ld.lavaLeft - 15, ld.groundTop - 10, lw + 30, 50);
    }

    lavaGfx.fillStyle(0x1a0200, 0.98);
    lavaGfx.fillRect(ld.lavaLeft - 10, ld.groundTop + 2, lw + 20, 42);

    for (let layer = 0; layer < 3; layer++) {
      const speed = 0.0025 + layer * 0.0012;
      const amp = 4 + layer * 2;
      const yBase = ld.groundTop + 18 + layer * 5;
      const colors = [0xFF3D00, 0xFF9100, 0xFFD180];
      const alphas = [0.85, 0.6, 0.35];
      lavaGfx.fillStyle(colors[layer], alphas[layer]);
      lavaGfx.beginPath();
      lavaGfx.moveTo(ld.lavaLeft, yBase + 14);
      for (let x = 0; x <= lw; x += 8) {
        const waveY = Math.sin((x * 0.03) + (time * speed * (layer % 2 === 0 ? 1 : -1)) + (layer * 2.7)) * amp;
        lavaGfx.lineTo(ld.lavaLeft + x, yBase + waveY);
      }
      lavaGfx.lineTo(ld.lavaRight, ld.groundTop + 46);
      lavaGfx.lineTo(ld.lavaLeft, ld.groundTop + 46);
      lavaGfx.closePath();
      lavaGfx.fillPath();
    }

    if (Math.random() < 0.02 && lavaBubbles.length < 15) {
      lavaBubbles.push({
        x: ld.lavaLeft + 15 + Math.random() * (lw - 30),
        y: ld.groundTop + 32,
        r: 2 + Math.random() * 5,
        speed: 0.6 + Math.random() * 1.2,
        life: 1,
        maxR: 2 + Math.random() * 5,
        pop: false
      });
    }
    lavaBubbles = lavaBubbles.filter(b => {
      b.y -= b.speed;
      b.life -= 0.014;
      const pulse = Math.sin(time * 0.015 + b.x) * 0.35 + 0.65;
      const curR = b.maxR * pulse * b.life;
      if (b.life > 0 && curR > 0.5) {
        lavaGfx.fillStyle(0xFFCC80, b.life * 0.9);
        lavaGfx.fillCircle(b.x, b.y, curR);
        lavaGfx.fillStyle(0xFFFFFF, b.life * 0.7);
        lavaGfx.fillCircle(b.x - curR*0.35, b.y - curR*0.35, curR * 0.4);
        lavaGfx.lineStyle(1, 0xFF7043, b.life * 0.5);
        lavaGfx.strokeCircle(b.x, b.y, curR);
        return true;
      }
      if (!b.pop && b.life <= 0) {
        b.pop = true;
        lavaGfx.fillStyle(0xFFEB3B, 0.6);
        for (let i = 0; i < 4; i++) {
          const angle = (Math.PI * 2 / 4) * i;
          lavaGfx.fillCircle(b.x + Math.cos(angle)*6, b.y + Math.sin(angle)*6, 1.5);
        }
      }
      return false;
    });
  }

  if (gameOverActive) return;
  if (gameWon) { player.setVelocity(0, 0); player.anims.play('turn'); return; }
  if (levelTransition) return;

  const speed = 200, jumpPower = GAME_CONFIG.PLAYER_JUMP_POWER, airCtrl = 0.67;
  if (keys.left) { player.setVelocityX(player.body.touching.down ? -speed : -speed * airCtrl); player.anims.play('left', true); }
  else if (keys.right) { player.setVelocityX(player.body.touching.down ? speed : speed * airCtrl); player.anims.play('right', true); }
  else { player.setVelocityX(0); player.anims.play('turn'); }

  if (keys.up && player.body.touching.down) { player.setVelocityY(-jumpPower); if (!Settings.muted) Audio.jump(); }
  if (keys.down && playerOnButton && !buttonPressed) {
    if (!Settings.muted) Audio.button();
    gameScene.tweens.add({ targets: lavaButton, y: '+=2', duration: 50, yoyo: true });
    openLavaCover(gameScene, getLevelData());
  }
  playerOnButton = false;
  if (player.y > 650) takeDamage();

  for (const w of windZones) {
    const dx = player.x - w.x;
    const dy = player.y - w.y;
    if (Math.abs(dx) < w.w/2 && Math.abs(dy) < w.h/2) {
      player.body.velocity.x += w.forceX * 0.025;
    }
  }

  if (spike && spikeAlive && !spikeStunned && !spikeFallingToLava) {
    const deltaX = player.x - spike.x;
    if (buttonPressed && spike.x > ld.lavaLeft && spike.x < ld.lavaRight) {
      spikeFallingToLava = true; spikeAlive = false; spike.body.setAllowGravity(true); spike.body.setImmovable(false); Audio.stopSpikeHum();
    } else {
      const maxSpeed = 3.2, accel = 0.14, friction = 0.92;
      if (Math.abs(deltaX) > 30) spikeVelX += Math.sign(deltaX) * accel;
      else spikeVelX *= friction;
      spikeVelX = Math.max(-maxSpeed, Math.min(maxSpeed, spikeVelX));
      spike.x += spikeVelX;
      const spd = Math.abs(spikeVelX);
      const rollPhase = (spike.x * 0.08) + (time * 0.007);
      const bounceH = Math.min(spd * 5.5, 16);
      const bounceY = Math.abs(Math.sin(rollPhase * Math.PI)) * bounceH;
      spike.y = (ld.groundTop - 16) - bounceY;
      const onGround = Math.sin(rollPhase * Math.PI) < 0.25;
      if (onGround) spike.setScale(0.52 + spd * 0.015, 0.48 - spd * 0.015);
      else spike.setScale(0.48 - spd * 0.008, 0.52 + spd * 0.008);
      spike.angle += spikeVelX * 4.5;
    }
  }

  if (spike && spikeFallingToLava && spike.y > ld.groundTop + 12) {
    spike.setVisible(false); spike.body.enable = false; spikeFallingToLava = false;
    if (!Settings.muted) Audio.spikeFall();
    const splash = gameScene.add.particles(spike.x, ld.groundTop + 20, 'spike', {
      scale: { start: 0.15, end: 0 }, speed: { min: 60, max: 160 }, lifespan: 600, quantity: 10, tint: [0xFF7043, 0xFFB74D]
    });
    gameScene.time.delayedCall(800, () => splash.destroy());
  }

  if (spike && spikeAlive && Audio.spikeActive && Audio.spikeFilter) {
    const dist = Math.abs(player.x - spike.x);
    Audio.spikeFilter.frequency.setTargetAtTime(Math.max(200, 800 - dist), Audio.ctx.currentTime, 0.1);
  }
}

function openDoor(scene) {
  doorOpen = true;
  if (!Settings.muted) Audio.doorCreak();
  const ld = getLevelData();
  const glowX = ld.doorPos.x + 9;
  const glowY = ld.doorPos.y - 28;
  scene.tweens.add({
    targets: doorGlow, alpha: 1, duration: 400,
    onUpdate: function(tween, target) {
      target.clear(); target.fillStyle(0x00E676, tween.getValue() * 0.5); target.fillRect(glowX, glowY, 4, 26);
    }
  });
  scene.tweens.add({
    targets: doorContainer, scaleX: 0.1, duration: 600, ease: 'Cubic.easeInOut',
    onComplete: () => {
      if (doorContainer) { doorContainer.destroy(); doorContainer = null; }
     
      if (doorFrame) { doorFrame.destroy(); doorFrame = null; }
      if (doorGlow) { doorGlow.destroy(); doorGlow = null; }
      gameWon = true;
      if (!Settings.muted) Audio.win();
      spawnWinParticles(scene, ld.doorPos.x, ld.doorPos.y - 15);
      scene.time.delayedCall(2500, () => { levelTransition = true; nextLevel(scene); });
    }
  });
}

function spawnWinParticles(scene, x, y) {
  winParticles = scene.add.particles(x, y, 'star_glow', {
    speed: { min: 40, max: 120 },
    angle: { min: 200, max: 340 },
    scale: { start: 0.8, end: 0 },
    lifespan: 1200,
    quantity: 2,
    frequency: 80,
    tint: [0x00E676, 0x69F0AE, 0xB9F6CA],
    blendMode: 'ADD'
  });
  scene.time.delayedCall(2000, () => { if (winParticles) { winParticles.destroy(); winParticles = null; } });
}

function nextLevel(scene) {
  if (currentLevel < totalLevels) {
    currentLevel++;
    if (!Settings.muted) Audio.levelUp();
    scene.cameras.main.fadeOut(600, 0, 0, 0);
    scene.time.delayedCall(700, () => {
      Audio.stopBGM(); Audio.stopSawHum(); Audio.stopSpikeHum();
      scene.scene.restart();
      document.getElementById('levelLabel').textContent = 'LEVEL ' + currentLevel;
    });
  } else {
    showGameComplete(scene);
  }
}

function showGameComplete(scene) {
  gameOverActive = true;
  const overlay = scene.add.rectangle(400, 300, 800, 600, 0x000000, 0.7);
  overlay.setDepth(3000);
  const title = scene.add.text(400, 240, 'SELAMAT!', { fontSize: '48px', fontFamily: 'monospace', color: '#00E676', fontStyle: 'bold' }).setOrigin(0.5);
  title.setDepth(3001);
  const sub = scene.add.text(400, 310, 'Semua level selesai!', { fontSize: '20px', fontFamily: 'monospace', color: '#ffb74d' }).setOrigin(0.5);
  sub.setDepth(3001);
  const hint = scene.add.text(400, 360, 'Tekan R untuk main lagi', { fontSize: '16px', fontFamily: 'monospace', color: '#aaa' }).setOrigin(0.5);
  hint.setDepth(3001);
  scene.tweens.add({ targets: title, scale: { from: 0.8, to: 1.1 }, duration: 800, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
}

function openLavaCover(scene, ld) {
  buttonPressed = true;
  if (lavaCoverCollider) { lavaCoverCollider.destroy(); lavaCoverCollider = null; }
  scene.tweens.add({
    targets: lavaCover, alpha: 0, duration: 600,
    onComplete: () => { if (lavaCover) { lavaCover.clear(); } }
  });
  if (lavaCoverBody) { lavaCoverBody.body.enable = false; }
}

function takeDamage() {
  if (isInvincible || gameOverActive || gameWon || levelTransition) return;
  lives--;
  if (!Settings.muted) Audio.damage();
  drawHearts(gameScene);
  if (lives <= 0) {
    triggerGameOver();
    return;
  }
  isInvincible = true;
  if (damageFlash) damageFlash.setFillStyle(0xFF0000, 0.4);
  gameScene.tweens.add({ targets: damageFlash, alpha: 0, duration: 300, onComplete: () => { if (damageFlash) damageFlash.setFillStyle(0xFF0000, 0); } });
  player.setTint(0xFF5252);
  if (invincibleTimer) invincibleTimer.remove();
  invincibleTimer = gameScene.time.delayedCall(GAME_CONFIG.INVINCIBLE_DURATION, () => {
    isInvincible = false;
    player.clearTint();
    if (blinkTimer) blinkTimer.remove();
  });
  if (blinkTimer) blinkTimer.remove();
  let blink = false;
  blinkTimer = gameScene.time.addEvent({
    delay: 120,
    repeat: Math.floor(GAME_CONFIG.INVINCIBLE_DURATION / 120) - 1,
    callback: () => { blink = !blink; if (blink) player.setTint(0xFF5252); else player.clearTint(); }
  });
  const knockbackX = player.x < 400 ? -180 : 180;
  player.setVelocity(knockbackX, -280);
}

function killSpike() {
  if (!spikeAlive || spikeStunned || spikeFallingToLava) return;
  spikeStunned = true;
  if (!Settings.muted) Audio.spikeKill();
  spike.setTint(0xFF5252);
  spike.body.setVelocity(0, -250);
  if (stunTimer) stunTimer.remove();
  stunTimer = gameScene.time.delayedCall(GAME_CONFIG.STUN_DURATION, () => {
    spikeStunned = false;
    if (spike && spikeAlive) { spike.clearTint(); spike.body.setVelocity(0, 0); }
  });
}

function triggerGameOver() {
  if (gameOverActive) return;
  gameOverActive = true;
  if (!Settings.muted) Audio.gameOver();
  player.setTint(0xFF0000);
  player.anims.play('turn');
  player.body.setAllowGravity(false);
  player.setVelocity(0, 0);
  Audio.stopBGM(); Audio.stopSawHum(); Audio.stopSpikeHum();
  const overlay = gameScene.add.rectangle(400, 300, 800, 600, 0x000000, 0.75);
  overlay.setDepth(3000);
  const title = gameScene.add.text(400, 250, 'GAME OVER', { fontSize: '44px', fontFamily: 'monospace', color: '#FF5252', fontStyle: 'bold' }).setOrigin(0.5);
  title.setDepth(3001);
  const hint = gameScene.add.text(400, 320, 'Tekan R untuk coba lagi', { fontSize: '18px', fontFamily: 'monospace', color: '#ffb74d' }).setOrigin(0.5);
  hint.setDepth(3001);
}

function restartLevel() {
  currentLevel = 1;
  lives = GAME_CONFIG.LIVES_START;
  Audio.stopBGM(); Audio.stopSawHum(); Audio.stopSpikeHum();
  if (gameScene) gameScene.scene.restart();
  document.getElementById('levelLabel').textContent = 'LEVEL 1';
}

function handleKeyDown(e) {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
  if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') {
    keys.up = true;
    if (!Audio.started) Audio.startAll();
  }
  if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = true;
  if (e.code === 'KeyR') restartLevel();
}

function handleKeyUp(e) {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
  if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.up = false;
  if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = false;
}

// ===== DOM EVENTS =====
document.addEventListener('DOMContentLoaded', () => {
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsPanel = document.getElementById('settingsPanel');
  const toggleMute = document.getElementById('toggleMute');
  const btnLeft = document.getElementById('btnLeft');
  const btnRight = document.getElementById('btnRight');
  const btnJump = document.getElementById('btnJump');

  if (settingsBtn && settingsPanel) {
    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      settingsPanel.classList.toggle('active');
    });
    document.addEventListener('click', (e) => {
      if (!settingsPanel.contains(e.target) && e.target !== settingsBtn) {
        settingsPanel.classList.remove('active');
      }
    });
  }

  if (toggleMute) {
    toggleMute.addEventListener('click', (e) => {
      e.stopPropagation();
      Settings.muted = !Settings.muted;
      toggleMute.classList.toggle('on', Settings.muted);
      Audio.updateMute();
    });
  }

  const addTouch = (elem, key) => {
    if (!elem) return;
    elem.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; if (!Audio.started) Audio.startAll(); });
    elem.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
    elem.addEventListener('mousedown', (e) => { e.preventDefault(); keys[key] = true; if (!Audio.started) Audio.startAll(); });
    elem.addEventListener('mouseup', (e) => { e.preventDefault(); keys[key] = false; });
    elem.addEventListener('mouseleave', (e) => { keys[key] = false; });
  };

  addTouch(btnLeft, 'left');
  addTouch(btnRight, 'right');
  addTouch(btnJump, 'up');

  // Canvas focus on click to capture keys
  const canvas = document.querySelector('canvas');
  if (canvas) {
    canvas.addEventListener('click', () => { if (!Audio.started) Audio.startAll(); canvas.focus(); });
  }
});

// ===== START GAME =====
const game = new Phaser.Game(config);
</script>
</body>
